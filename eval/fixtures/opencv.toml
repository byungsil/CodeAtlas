# Ground-truth fixture for the OpenCV real-project workspace.
#
# Seeded from dev_docs/RepresentativeRegressionList.md and direct probing of
# the existing OpenCV index. These cases are deliberately split between
# already-passing (smoke / baseline) and currently-failing (regression
# targets for the Tier 1 accuracy work).
#
# A current FAIL means "the indexer has a known weakness here, and the
# expected entry below is what we are working toward". Do not relax the
# expectation to make the test green — fix the indexer instead.
#
# Run:  py -3 eval/eval_fixtures.py eval/fixtures/opencv.toml
#
# Required: F:/dev/opencv has been indexed by CodeAtlas, so
#           F:/dev/opencv/.codeatlas/index-*.db exists.

[fixture]
name        = "opencv"
workspace   = "F:/dev/opencv"
db_glob     = ".codeatlas/index-*.db"
description = "OpenCV real-project regression fixtures."

# ════════════════════════════════════════════════════════════════════════
# A. Representative-anchor regression targets (currently weak)
# ════════════════════════════════════════════════════════════════════════
# These cases are the published regression list. They are EXPECTED TO FAIL
# until Tier 1 #3 (anchor weighting: penalize *.inl headers, prefer public
# include/ over CUDA-specialized inline files) lands. The fixture pins the
# desired anchor family so we can measure progress.

[[symbol]]
id             = "cv_Mat_Mat_ctor"
qualified_name = "cv::Mat::Mat"
# MS25 extracted 13+ cv:: classes that used to be missing (see cv_AutoBuffer
# below as a positive flip), but cv::Mat itself remained absent: every other
# .cpp TU's libclang visit of mat.hpp ends up missing the non-template class
# bodies (Mat, UMat, SparseMat, _InputArray, ...). Tree-sitter's mat.hpp
# parse — the one path that *does* reach those lines — produces a single
# 3800-line ERROR span and recovers only enums and the two templated
# classes. Both routes fail on this file; the remaining work is to teach
# the libclang path to visit mat.hpp's body when it's pulled in by a TU.
xfail_pending = "ms26-mat-hpp-body-visit"

  [symbol.representative]
  required_path_patterns  = ["modules/core/include/opencv2/core/(mat\\.hpp|mat\\.inl\\.hpp)"]
  forbidden_path_patterns = ["cuda\\.inl\\.hpp", "/test/", "/samples/"]

# ════════════════════════════════════════════════════════════════════════
# B. Missing-symbol regression target
# ════════════════════════════════════════════════════════════════════════
# `cv::Mat` (the class itself) is NOT currently in the index — only its
# constructor cv::Mat::Mat appears, anchored to a CUDA inline header. A
# class as central as cv::Mat must have a class-kind symbol record.

[[symbol]]
id             = "cv_Mat_class"
qualified_name = "cv::Mat"
# Same root cause as cv_Mat_Mat_ctor: mat.hpp's non-template class bodies
# (incl. cv::Mat at line 839) are not picked up by any TU's libclang
# visit, even after MS25 admitted workspace-header symbols broadly. The
# investigation suggests the include-guard / macro state in opencv's
# precomp chain consumes mat.hpp before the bodies are visited. Out of
# MS25 scope; carried as a regression target for a future milestone.
xfail_pending = "ms26-mat-hpp-body-visit"

  [symbol.representative]
  required_path_patterns = ["modules/core/include/opencv2/core/mat\\.hpp"]

  [symbol.references]
  # Even a generous lower bound flags the current zero-reference state.
  mode      = "count_band"
  min_count = 50
  max_count = 1000000

# ════════════════════════════════════════════════════════════════════════
# B'. MS25 positive flip — header class recovered via workspace-aware emit
# ════════════════════════════════════════════════════════════════════════
# Before MS25 every cv:: class declared in a workspace header that has no
# compile_commands.json entry of its own was lost — the indexer routed
# such headers to tree-sitter, which crashes on macro-heavy declarations.
# After MS25, libclang's visit of those headers via includer TUs admits
# the symbols. cv::AutoBuffer (utility.hpp) is the canonical case: not in
# compile_commands, but seen by hundreds of .cpp TUs through core.hpp.

[[symbol]]
id             = "cv_AutoBuffer_class"
qualified_name = "cv::AutoBuffer"

  [symbol.representative]
  required_path_patterns  = ["modules/core/include/opencv2/core/utility\\.hpp"]
  forbidden_path_patterns = ["/test/", "/samples/"]

# ════════════════════════════════════════════════════════════════════════
# C. Currently-passing smoke cases
# ════════════════════════════════════════════════════════════════════════
# Baseline. If these regress, the indexer broke something basic.

[[symbol]]
id             = "cv_imread"
qualified_name = "cv::imread"
# MS24 primary regression target. cv::imread resolves to 3 USR clusters
# (1 public-header declaration + 2 out-of-line .cpp definitions). Before
# MS24, lookup_function returned whichever row sqlite found first — often
# the .cpp definition, sometimes one or the other. After MS24, the server-
# side ORDER BY must select the public-header declaration deterministically.

  [symbol.representative]
  required_path_patterns  = ["modules/imgcodecs/(include/opencv2/imgcodecs\\.hpp|src/loadsave\\.cpp)"]
  forbidden_path_patterns = ["/test/", "/samples/"]
  # MS24: the *selected* anchor (what lookup_function would return) must
  # be the public-header declaration, not the .cpp definition.
  selected_path_pattern   = "modules/imgcodecs/include/opencv2/imgcodecs\\.hpp"

  # cv::imread is called from many places (samples, tests, internal modules).
  # The exact set varies, so a generous count band catches "calls dropped to
  # zero" regressions without being brittle.
  [symbol.references]
  mode      = "count_band"
  min_count = 0
  max_count = 100000

[[symbol]]
id             = "cv_imwrite"
qualified_name = "cv::imwrite"

  [symbol.representative]
  required_path_patterns  = ["modules/imgcodecs/(include/opencv2/imgcodecs\\.hpp|src/loadsave\\.cpp)"]
  forbidden_path_patterns = ["/test/"]

[[symbol]]
id             = "cv_imshow"
qualified_name = "cv::imshow"

  [symbol.representative]
  required_path_patterns  = ["modules/highgui/include/opencv2/highgui\\.hpp"]
  forbidden_path_patterns = ["/test/"]

# ════════════════════════════════════════════════════════════════════════
# D. gapi::own::Mat — sibling/duplicate of cv::Mat
# ════════════════════════════════════════════════════════════════════════
# Confirms that the gapi-specific Mat class is correctly anchored to its
# own header and not accidentally collapsed into cv::Mat.

[[symbol]]
id             = "cv_gapi_own_Mat_class"
qualified_name = "cv::gapi::own::Mat"

  [symbol.representative]
  required_path_patterns = ["modules/gapi/include/opencv2/gapi/own/mat\\.hpp"]
